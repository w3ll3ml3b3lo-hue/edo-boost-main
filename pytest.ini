# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini
#
# [IMMEDIATE FIX 4] Added --cov-fail-under=70 to enforce a minimum 70%
#                   coverage gate. CI will fail if coverage drops below this.
#                   Increase the threshold incrementally as the test suite grows.
# ─────────────────────────────────────────────────────────────────────────────

[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Coverage ──────────────────────────────────────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit: fast, isolated unit tests (no I/O)
    integration: tests that require a live DB or Redis
    e2e: end-to-end tests via Playwright (require running stack)
    slow: tests that take >5 seconds
    llm: tests that make real LLM API calls (skipped in CI unless ALLOW_LLM_TESTS=1)

# ── Warnings ──────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ── Default markers to exclude in standard CI run ─────────────────────────────
# Run with: pytest -m "not llm and not e2e"
# Full run:  pytest   (includes all markers)
