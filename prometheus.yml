global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'eduboost-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'eduboost-inference'
    static_configs:
      - targets: ['inference:9100']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  - job_name: 'celery'
    static_configs:
      - targets: ['flower:5555']
