name: EduBoost CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Backend Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install lint tools
      run: pip install ruff

    - name: Run Ruff Linter
      run: ruff check app/ --output-format=github

    - name: Run Ruff Formatter Check
      run: ruff format --check app/

  # ── Backend Security Scan ────────────────────────────────────────────────────
  backend-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Run pip-audit (security scan)
      run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-0 || true
      # Non-blocking for now — will be enforced after initial triage

  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eduboost_user
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: eduboost
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://eduboost_user:devpassword@localhost:5432/eduboost
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      JWT_SECRET: ci-test-secret-key-32-chars-long
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      ENCRYPTION_SALT: ci-test-salt

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Apply DB Schema
      run: |
        PGPASSWORD=devpassword psql -h localhost -U eduboost_user -d eduboost -f scripts/db_init.sql
        PGPASSWORD=devpassword psql -h localhost -U eduboost_user -d eduboost -f scripts/db_migration_phase2.sql
      env:
        PGPASSWORD: devpassword

    - name: Run Backend Tests
      run: |
        pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v || true

  # ── Docker Build Validation ──────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Image
      run: docker build -f docker/Dockerfile.api -t eduboost-api:ci .

    - name: Build Frontend Image
      run: docker build -f docker/Dockerfile.frontend -t eduboost-frontend:ci app/frontend

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './app/frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci || npm install --legacy-peer-deps

    - name: Run Frontend Tests
      run: npm run test -- --run || true

    - name: Build Next.js
      run: npm run build
