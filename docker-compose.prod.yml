# ─────────────────────────────────────────────────────────────────────────────
# EduBoost SA — Docker Compose (Production)
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   All secrets must be supplied via environment or a .env.prod file.
#   Never commit .env.prod to version control.
#
# Architecture decisions:
#   - No bind-mounts of source code (image is the artefact)
#   - Nginx reverse-proxy in front of API and frontend
#   - Internal network only; only Nginx exposes ports 80/443
#   - DB-migrate runs once as a dependency; all services wait for it
# ─────────────────────────────────────────────────────────────────────────────
name: eduboost-sa-prod

networks:
  eduboost-net:
    driver: bridge
    internal: false   # Nginx needs external access
  internal-net:
    driver: bridge
    internal: true    # Backend services hidden from internet

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  nginx_logs:

services:

  # ── NGINX: SSL termination + reverse proxy ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: eduboost-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro   # Mount TLS certs (Let's Encrypt / ACM)
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - eduboost-net
      - internal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FRONTEND: Next.js (standalone output) ──────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io}/nkgolol/eduboost-sa/frontend:${IMAGE_TAG:-latest}
    container_name: eduboost-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - internal-net
    restart: unless-stopped

  # ── DB MIGRATE: one-shot, runs before api starts ───────────────────────
  db-migrate:
    image: ${REGISTRY:-ghcr.io}/nkgolol/eduboost-sa/api:${IMAGE_TAG:-latest}
    container_name: eduboost-migrate
    command: ["/bin/bash", "/workspace/docker/migrate.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - SEED_ON_BOOT=false   # Never seed in production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-net
    restart: "no"

  # ── BACKEND: FastAPI ───────────────────────────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io}/nkgolol/eduboost-sa/api:${IMAGE_TAG:-latest}
    container_name: eduboost-api
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - internal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── CELERY WORKER ──────────────────────────────────────────────────────
  celery-worker:
    image: ${REGISTRY:-ghcr.io}/nkgolol/eduboost-sa/api:${IMAGE_TAG:-latest}
    container_name: eduboost-celery
    command: celery -A app.api.core.celery_app worker --loglevel=warning --concurrency=4 -Q default,lessons,diagnostics
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      - postgres
      - redis
      - db-migrate
    networks:
      - internal-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ── CELERY BEAT ────────────────────────────────────────────────────────
  celery-beat:
    image: ${REGISTRY:-ghcr.io}/nkgolol/eduboost-sa/api:${IMAGE_TAG:-latest}
    container_name: eduboost-beat
    command: celery -A app.api.core.celery_app beat --loglevel=warning --scheduler redbeat.RedBeatScheduler
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
      - db-migrate
    networks:
      - internal-net
    restart: unless-stopped

  # ── POSTGRESQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eduboost-postgres
    expose:
      - "5432"   # Internal only — never expose port 5432 in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/data/server.crt
        -c ssl_key_file=/var/lib/postgresql/data/server.key
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c shared_preload_libraries=pg_stat_statements
    networks:
      - internal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── REDIS ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduboost-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.prod.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - internal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PROMETHEUS ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: eduboost-prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    networks:
      - internal-net
    restart: unless-stopped

  # ── GRAFANA ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: eduboost-grafana
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
    depends_on:
      - prometheus
    networks:
      - internal-net
    restart: unless-stopped
